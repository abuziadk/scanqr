<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

<style>
body{
    font-family:"Tajawal",sans-serif;
    background:linear-gradient(135deg,#f3f6f4,#e7f1ed);
    min-height:100vh;
}

.moe-green{ color:#017c67; }

.moe-card{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-radius:18px;
    border:1px solid rgba(1,124,103,.15);
    padding:25px;
}

.moe-btn{
    background:linear-gradient(135deg,#017c67,#029a82);
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
}

/* البطاقة المنبثقة */
#popupBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: white;
    padding: 25px 35px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transition: 0.25s ease;
    z-index: 9999;
}

#popupBox.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

#popupName {
    font-size: 28px;
    font-weight: bold;
    color: #017c67;
}

#popupStatus {
    font-size: 20px;
    margin-top: 8px;
    color: #444;
}

/* Toast */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #017c67;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 16px;
    display: none;
    z-index: 99999;
}
</style>
</head>

<body>

<!-- صوت النجاح -->
<audio id="successSound" src="success.mp3"></audio>

<!-- Toast -->
<div id="toast"></div>

<!-- البطاقة المنبثقة -->
<div id="popupBox">
    <div id="popupName"></div>
    <div id="popupStatus"></div>
</div>

<div class="max-w-xl mx-auto p-6">
<div class="moe-card shadow-lg">

<div class="text-center mb-6">
<h1 class="text-3xl font-extrabold moe-green">
مسح QR لتسجيل الحضور
</h1>
<p class="text-gray-500 text-sm mt-2">
مدرسة تحفيظ القرآن الكريم الابتدئية والمتوسطة بضمد
</p>
</div>

<!-- زر تفعيل الصوت -->
<button onclick="enableSound()" class="moe-btn w-full mb-4">
تفعيل الصوت
</button>

<!-- زر تحديث الشيت -->
<button onclick="syncToSheet()" class="moe-btn w-full mb-4 bg-blue-600">
<button onclick="syncSettings()" class="moe-btn w-full mb-4 bg-purple-600">
    تحديث الإعدادات
</button>

تحديث الشيت
</button>

<div id="reader" class="w-full border-2 border-green-700 rounded-xl"></div>

</div>
</div>

<script>

// زر تحديث الإعدادات من الشيت
function syncSettings() {
    fetch("https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec?action=syncSettings")
        .then(r => r.text())
        .then(() => showToast("تم تحديث الإعدادات"))
        .catch(() => showToast("فشل تحديث الإعدادات"));
}

// إرسال SMS إلى sms_queue
function sendSMS(mobile, message) {
    db.ref("sms_queue").push({
        mobile: mobile,
        message: message,
        sent: false
    });
}

// إعدادات SMS
const SMS_API_URL = "https://app.mobile.net.sa/api/v1/send";
const SMS_API_KEY = "XRGdRQaYcesQbFy6rtzS2pOGARSHXBG7yAqC4rDr";
const SMS_SENDER_NAME = "School1";

let scanner = null;
let soundEnabled = false;
let scannerBusy = false;

/* Toast */
function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 2000);
}

/* تفعيل الصوت */
function enableSound() {
    const audio = document.getElementById("successSound");
    audio.muted = true;
    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        soundEnabled = true;
        showToast("تم تفعيل الصوت بنجاح ✔");
    }).catch(() => {
        showToast("اضغط مرة أخرى لتفعيل الصوت");
    });
}

/* تحميل الإعدادات من Firebase */
let SETTINGS = {
    END_PRESENT: "9:00",
    END_LATE: "10:40",
    ABSENCE_SMS_TIME: "11:00"
};

db.ref("settings").once("value").then(snap => {
    if (snap.exists()) {
        SETTINGS = snap.val();
        console.log("Settings loaded:", SETTINGS);
    }
});

/* حساب حالة الطالب */
function getAttendanceStatus(timeStr) {
    if (!timeStr) return "غائب";

    const [h, m] = timeStr.split(":").map(Number);
    const studentMin = h * 60 + m;

    const [pH, pM] = SETTINGS.END_PRESENT.split(":").map(Number);
    const endPresentMin = pH * 60 + pM;

    const [lH, lM] = SETTINGS.END_LATE.split(":").map(Number);
    const endLateMin = lH * 60 + lM;

    if (studentMin <= endPresentMin) return "حاضر";
    if (studentMin <= endLateMin) return "متأخر";
    return "غائب";
}

/* تشغيل الكاميرا */
function startScanner(){
    scanner = new Html5Qrcode("reader");
    const config = { fps:10, qrbox:{width:280,height:280} };

    scanner.start(
        {facingMode:"environment"},
        config,
        onScanSuccess,
        ()=>{}
    ).catch(()=>{
        Html5Qrcode.getCameras().then(cams=>{
            if(!cams.length){ showToast("لا توجد كاميرات"); return; }
            scanner.start(cams[0].id,config,onScanSuccess,()=>{});
        });
    });
}

/* البطاقة المنبثقة */
function showPopup(name, status){
    document.getElementById("popupName").textContent = name;
    document.getElementById("popupStatus").textContent = status;
    const box = document.getElementById("popupBox");
    box.classList.add("show");
    setTimeout(()=>{ box.classList.remove("show"); }, 2000);
}

/* عند قراءة QR */
function onScanSuccess(decodedText){

    if (scannerBusy) return;
    scannerBusy = true;

    let data;

    try { 
        data = JSON.parse(decodedText); 
    } catch (e) {
        showPopup("خطأ", "QR غير صالح");
        scannerBusy = false;
        return setTimeout(startScanner, 600);
    }

    if (!data.ID || !data.TOKEN) {
        showPopup("خطأ", "QR غير مكتمل");
        scannerBusy = false;
        return setTimeout(startScanner, 600);
    }

    if (soundEnabled) {
        const audio = document.getElementById("successSound");
        audio.play().catch(()=>{});
    }

    scanner.stop().then(() => {
        recordAttendance(data);
    }).catch(() => {
        scannerBusy = false;
        startScanner();
    });
}

/* تسجيل الحضور */
function recordAttendance(stu){

    const now = new Date();
    const today = now.toLocaleDateString("en-CA");

    const timeShort = now.toTimeString().slice(0,5);
    const timeFull = now.toLocaleTimeString("ar-SA");

    const firstName = (stu.NAME || "").split(" ")[0];

    const ref = db.ref("attendance/" + today + "/" + stu.ID);

    ref.once("value").then(snapshot => {

        if (snapshot.exists()) {
            const status = snapshot.val().status;
            showPopup(firstName, "مسجل مسبقًا - " + status);

            setTimeout(() => {
                scannerBusy = false;
                startScanner();
            }, 1200);

            return;
        }

        const status = getAttendanceStatus(timeShort);

        // إرسال رسالة التأخر فقط
        if (status === "متأخر" && stu.parentMobile) {
            const msg = `ابنكم (${firstName}) تأخر عن الحضور وقت الوصول ${timeFull}`;
            sendSMS(stu.parentMobile, msg);
        }

        ref.set({
            id: stu.ID,
            name: stu.NAME,
            grade: stu.GRADE,
            class: stu.CLASS,
            parentMobile: stu.parentMobile,
            time: timeFull,
            date: today,
            status: status
        }).then(() => {

            showPopup(firstName, "تم تسجيل: " + status);

            setTimeout(() => {
                scannerBusy = false;
                startScanner();
            }, 1200);

        }).catch(() => {

            showPopup("خطأ", "تعذر تسجيل الحضور");

            setTimeout(() => {
                scannerBusy = false;
                startScanner();
            }, 1200);

        });

    });
}

/* تحديث الشيت */
function syncToSheet() {
    fetch("https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec?action=sync")
        .then(r => r.text())
        .then(msg => { showToast("تم تحديث الشيت بنجاح"); })
        .catch(() => { showToast("فشل تحديث الشيت"); });
}

startScanner();

</script>



</script>

</body>
</html>
