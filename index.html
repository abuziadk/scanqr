<style>
body{
    font-family:"Tajawal",sans-serif;
    background:#f3f6f4;
    min-height:100vh;
}

.moe-card{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.moe-btn{
    background:#017c67;
    color:white;
    padding:12px;
    border-radius:10px;
    font-weight:600;
    width:100%;
    margin-bottom:10px;
}

/* Popup */
#popupBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: white;
    padding: 25px 35px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transition: 0.25s ease;
    z-index: 9999;
}
#popupBox.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
#popupName { font-size: 26px; font-weight: bold; color:#017c67; }
#popupStatus { font-size: 20px; margin-top: 8px; color:#444; }

/* Toast */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #017c67;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 16px;
    display: none;
    z-index: 99999;
}
</style>
</head>

<body>

<!-- input مخفي لاستقبال الباركود -->
<input id="barcodeInput" type="text" style="opacity:0; position:absolute; left:-9999px;">

<!-- صوت النجاح -->
<audio id="successSound" src="success.mp3"></audio>

<!-- Toast -->
<div id="toast"></div>

<!-- Popup -->
<div id="popupBox">
    <div id="popupName"></div>
    <div id="popupStatus"></div>
</div>

<div class="max-w-xl mx-auto p-6">
<div class="moe-card">

<h1 class="text-3xl font-extrabold text-center text-green-700 mb-2">
مسح QR وتسجيل الحضور
</h1>

<p class="text-center text-gray-500 mb-6">
مدرسة تحفيظ القرآن الكريم
</p>

<button onclick="enableSound()" class="moe-btn">تفعيل الصوت</button>
<button onclick="syncToSheet()" class="moe-btn" style="background:#005bbb">تحديث الشيت</button>

<div id="reader" class="w-full border-2 border-green-700 rounded-xl mt-4"></div>

</div>
</div>

<script>
/* Toast */
function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=>{ t.style.display="none"; },2000);
}

/* Popup */
function showPopup(name,status){
    document.getElementById("popupName").textContent = name;
    document.getElementById("popupStatus").textContent = status;
    const box = document.getElementById("popupBox");
    box.classList.add("show");
    setTimeout(()=>{ box.classList.remove("show"); },2000);
}

/* تفعيل الصوت */
let soundEnabled = false;
function enableSound(){
    const audio = document.getElementById("successSound");
    audio.muted = true;
    audio.play().then(()=>{
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        soundEnabled = true;
        showToast("تم تفعيل الصوت ✔");
    });
}

/* تحميل الإعدادات */
let SETTINGS = { END_PRESENT:"9:00", END_LATE:"10:40" };
db.ref("settings").once("value").then(s=>{ if(s.exists()) SETTINGS=s.val(); });

function getAttendanceStatus(timeStr){
    const [h,m] = timeStr.split(":").map(Number);
    const studentMin = h*60+m;

    const [pH,pM] = SETTINGS.END_PRESENT.split(":").map(Number);
    const endPresent = pH*60+pM;

    const [lH,lM] = SETTINGS.END_LATE.split(":").map(Number);
    const endLate = lH*60+lM;

    if(studentMin <= endPresent) return "حاضر";
    if(studentMin <= endLate) return "متأخر";
    return "غائب";
}

/* تشغيل QR */
let scannerBusy = false;
function startScanner(){
    const scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:{width:260,height:260} },
        (decoded)=>onQR(decoded,scanner),
        ()=>{}
    );
}

function onQR(decodedText,scanner){
    if(scannerBusy) return;
    scannerBusy = true;

    let data;
    try { data = JSON.parse(decodedText); }
    catch { showPopup("خطأ","QR غير صالح"); scannerBusy=false; return; }

    if(!data.ID){
        showPopup("خطأ","QR غير مكتمل");
        scannerBusy=false;
        return;
    }

    if(soundEnabled) document.getElementById("successSound").play();

    scanner.stop().then(()=> recordAttendance(data.ID) );
}

/* تسجيل الحضور */
function recordAttendance(id){
    const today = new Date().toLocaleDateString("en-CA");
    const ref = db.ref("attendance/"+today+"/"+id);

    ref.once("value").then(snap=>{
        if(snap.exists()){
            showPopup("الطالب","مسجل مسبقًا");
            scannerBusy=false;
            return startScanner();
        }

        db.ref("students/"+id).once("value").then(stuSnap=>{
            if(!stuSnap.exists()){
                showPopup("خطأ","الطالب غير موجود");
                scannerBusy=false;
                return startScanner();
            }

            const stu = stuSnap.val();
            const now = new Date();
            const timeShort = now.toTimeString().slice(0,5);
            const timeFull = now.toLocaleTimeString("ar-SA");
            const status = getAttendanceStatus(timeShort);

            ref.set({
                id:id,
                name:stu.NAME,
                grade:stu.GRADE,
                class:stu.CLASS,
                parentMobile:stu.PARENT_MOBILE,
                time:timeFull,
                date:today,
                status:status
            });

            showPopup(stu.NAME.split(" ")[0],"تم تسجيل: "+status);
            scannerBusy=false;
            startScanner();
        });
    });
}

/* دعم الباركود عبر البلوتوث */
let barcodeBuffer = "";
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        const code = barcodeBuffer.trim();
        barcodeBuffer="";
        if(/^\d+$/.test(code)){
            recordAttendance(code);
        }
    } else {
        barcodeBuffer += e.key;
    }
});

/* تحديث الشيت */
function syncToSheet(){
    fetch("https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec?action=sync")
    .then(()=>showToast("تم تحديث الشيت"))
    .catch(()=>showToast("فشل تحديث الشيت"));
}

startScanner();
</script>

</body>
</html>
