<style>
body{
    font-family:"Tajawal",sans-serif;
    background:linear-gradient(135deg,#f3f6f4,#e7f1ed);
    min-height:100vh;
}

.moe-green{ color:#017c67; }

.moe-card{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-radius:18px;
    border:1px solid rgba(1,124,103,.15);
    padding:25px;
}

.moe-btn{
    background:linear-gradient(135deg,#017c67,#029a82);
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
}

/* مربع التركيز فوق الفيديو */
#focus-box {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 260px;
    height: 260px;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff88;
    border-radius: 12px;
    box-shadow: 0 0 20px #00ff88;
    z-index: 999;
    pointer-events: none;
}

/* البطاقة المنبثقة */
#popupBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: white;
    padding: 25px 35px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transition: 0.25s ease;
    z-index: 9999;
}

#popupBox.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

#popupName {
    font-size: 28px;
    font-weight: bold;
    color: #017c67;
}

#popupStatus {
    font-size: 20px;
    margin-top: 8px;
    color: #444;
}

/* Toast */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #017c67;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 16px;
    display: none;
    z-index: 99999;
}
</style>
</head>

<body>

<!-- الإطار الأخضر -->
<div id="focus-box"></div>

<!-- صوت النجاح -->
<audio id="successSound" src="success.mp3"></audio>

<!-- Toast -->
<div id="toast"></div>

<!-- البطاقة المنبثقة -->
<div id="popupBox">
    <div id="popupName"></div>
    <div id="popupStatus"></div>
</div>

<div class="max-w-xl mx-auto p-6">
<div class="moe-card shadow-lg">

<div class="text-center mb-6">
<h1 class="text-3xl font-extrabold moe-green">
مسح QR لتسجيل الحضور
</h1>
<p class="text-gray-500 text-sm mt-2">
مدرسة تحفيظ القرآن الكريم الابتدئية والمتوسطة بضمد
</p>
</div>

<button onclick="enableSound()" class="moe-btn w-full mb-4">
تفعيل الصوت
</button>

<button onclick="syncToSheet()" class="moe-btn w-full mb-4 bg-blue-600">
تحديث الشيت
</button>

<button onclick="syncSettings()" class="moe-btn w-full mb-4 bg-purple-600">
    تحديث الإعدادات
</button>

<!-- الماسح -->
<div id="reader" class="w-full border-2 border-green-700 rounded-xl"></div>

</div>
</div>

<script>

/* إعدادات الكاميرا الخلفية */
const cameraConstraints = {
    facingMode: { ideal: "environment" },
    width: { ideal: 1280 },
    height: { ideal: 720 },
    advanced: [
        { focusMode: "continuous" },
        { exposureMode: "continuous" },
        { whiteBalanceMode: "continuous" }
    ]
};

let scanner = null;
let soundEnabled = false;
let scannerBusy = false;

/* Toast */
function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 2000);
}

/* تفعيل الصوت */
function enableSound() {
    const audio = document.getElementById("successSound");
    audio.muted = true;
    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        soundEnabled = true;
        showToast("تم تفعيل الصوت ✔");
    });
}

/* تشغيل الماسح */
function startScanner(){
    scanner = new Html5Qrcode("reader");

    scanner.start(
        cameraConstraints,
        {
            fps: 12,
            qrbox: { width: 260, height: 260 },
            aspectRatio: 1.0,
            disableFlip: true,
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            }
        },
        onScanSuccess,
        () => {}
    );
}

/* البطاقة المنبثقة */
function showPopup(name, status){
    document.getElementById("popupName").textContent = name;
    document.getElementById("popupStatus").textContent = status;
    const box = document.getElementById("popupBox");
    box.classList.add("show");
    setTimeout(()=>{ box.classList.remove("show"); }, 2000);
}

/* عند قراءة QR */
function onScanSuccess(decodedText){
    if (scannerBusy) return;
    scannerBusy = true;

    let data;
    try { data = JSON.parse(decodedText); }
    catch {
        showPopup("خطأ", "QR غير صالح");
        return restartScanner();
    }

    if (!data.ID || !data.TOKEN) {
        showPopup("خطأ", "QR غير مكتمل");
        return restartScanner();
    }

    if (soundEnabled) {
        document.getElementById("successSound").play().catch(()=>{});
    }

    scanner.stop().then(() => {
        recordAttendance(data);
    });
}

/* تسجيل الحضور */
function recordAttendance(stu){
    const now = new Date();
    const today = now.toLocaleDateString("en-CA");
    const timeShort = now.toTimeString().slice(0,5);
    const timeFull = now.toLocaleTimeString("ar-SA");
    const firstName = (stu.NAME || "").split(" ")[0];

    const ref = db.ref("attendance/" + today + "/" + stu.ID);

    ref.once("value").then(snapshot => {

        if (snapshot.exists()) {
            showPopup(firstName, "مسجل مسبقًا");
            return restartScanner();
        }

        const status = getAttendanceStatus(timeShort);

        ref.set({
            id: stu.ID,
            name: stu.NAME,
            grade: stu.GRADE,
            class: stu.CLASS,
            parentMobile: stu.parentMobile,
            time: timeFull,
            date: today,
            status: status
        }).then(() => {
            showPopup(firstName, "تم تسجيل: " + status);
            restartScanner();
        });
    });
}

function restartScanner(){
    setTimeout(() => {
        scannerBusy = false;
        startScanner();
    }, 1200);
}

/* تحديث الشيت */
function syncToSheet() {
    fetch("https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec?action=sync")
        .then(() => showToast("تم تحديث الشيت"))
        .catch(() => showToast("فشل تحديث الشيت"));
}

startScanner();

</script>

</body>
</html>
