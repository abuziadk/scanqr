<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>مسح QR وتسجيل الحضور</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCtzKF6tPdNF9NP34xbz0VNALLU_pW5Tkw",
    authDomain: "attendancesystem-d46ba.firebaseapp.com",
    databaseURL: "https://attendancesystem-d46ba-default-rtdb.firebaseio.com/",
    projectId: "attendancesystem-d46ba",
    storageBucket: "attendancesystem-d46ba.firebasestorage.app",
    messagingSenderId: "472598700266",
    appId: "1:472598700266:web:de916774d90fbe518cb793",
    measurementId: "G-Z6YXDGFHRY"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* إرسال SMS */
function sendSMS(mobile, message) {
    db.ref("sms_queue").push({
        mobile: mobile,
        message: message,
        sent: false
    });
}
</script>

<style>
body{
    font-family:"Tajawal",sans-serif;
    background:#f3f6f4;
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* زر التحكم */
.toggle-btn{
    background:#017c67;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    width:90%;
    max-width:400px;
    margin-top:15px;
    text-align:center;
}

/* Popup */
#popupBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: white;
    padding: 25px 35px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transition: 0.25s ease;
    z-index: 9999;
}
#popupBox.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
#popupName { font-size: 26px; font-weight: bold; color:#017c67; }
#popupStatus { font-size: 20px; margin-top: 8px; color:#444; }

/* Toast */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #017c67;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 16px;
    display: none;
    z-index: 99999;
}

/* Full Screen Scanner */
#reader {
    width: 100vw;
    height: 70vh;
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
}
</style>
</head>

<body>

<audio id="successSound" src="success.mp3"></audio>

<div id="toast"></div>

<div id="popupBox">
    <div id="popupName"></div>
    <div id="popupStatus"></div>
</div>
<div class="toggle-btn" onclick="toggleScanner()">تشغيل / إيقاف الماسح</div>
<div class="toggle-btn" style="background:#005bbb" onclick="syncToSheet()">تحديث الشيت</div>

<div id="reader"></div>

<script>
/* Toast */
function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=>{ t.style.display="none"; },2000);
}

/* Popup */
function showPopup(name,status){
    document.getElementById("popupName").textContent = name;
    document.getElementById("popupStatus").textContent = status;
    const box = document.getElementById("popupBox");
    box.classList.add("show");
    setTimeout(()=>{ box.classList.remove("show"); },2000);
}

/* الصوت */
let soundEnabled = false;
function enableSound(){
    const audio = document.getElementById("successSound");
    audio.muted = true;
    audio.play().then(()=>{
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        soundEnabled = true;
        showToast("تم تفعيل الصوت ✔");
    });
}

/* الإعدادات */
let SETTINGS = { END_PRESENT:"9:00", END_LATE:"10:40" };
db.ref("settings").once("value").then(s=>{ if(s.exists()) SETTINGS=s.val(); });

function getAttendanceStatus(timeStr){
    if(!timeStr) return "غائب";
    const [h,m] = timeStr.split(":").map(Number);
    const t = h*60+m;

    const [pH,pM] = SETTINGS.END_PRESENT.split(":").map(Number);
    const endPresent = pH*60+pM;

    const [lH,lM] = SETTINGS.END_LATE.split(":").map(Number);
    const endLate = lH*60+lM;

    if(t <= endPresent) return "حاضر";
    if(t <= endLate) return "متأخر";
    return "غائب";
}

/* QR Scanner */
let scanner = null;
let scannerRunning = false;
let scannerBusy = false;

function toggleScanner(){
    if(scannerRunning){
        scanner.stop();
        scannerRunning = false;
        showToast("تم إيقاف الماسح");
    } else {
        startScanner();
        showToast("تم تشغيل الماسح");
    }
}

function startScanner(){
    scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:{width:300,height:300} },
        (decoded)=>onQR(decoded),
        ()=>{}
    );
    scannerRunning = true;
}

function onQR(decodedText){
    if(scannerBusy) return;
    scannerBusy = true;

    let data;
    try { data = JSON.parse(decodedText); }
    catch {
        showPopup("خطأ","QR غير صالح");
        scannerBusy=false;
        return;
    }

    if(!data.ID){
        showPopup("خطأ","QR غير مكتمل");
        scannerBusy=false;
        return;
    }

    if(soundEnabled) document.getElementById("successSound").play();

    scanner.stop().then(()=> recordAttendance(data.ID) );
}

/* تسجيل الحضور */
function recordAttendance(id){
    const today = new Date().toLocaleDateString("en-CA");
    const ref = db.ref("attendance/"+today+"/"+id);

    ref.once("value").then(snap=>{
        if(snap.exists()){
            showPopup("الطالب","مسجل مسبقًا - " + snap.val().status);
            scannerBusy=false;
            return startScanner();
        }

        db.ref("students/"+id).once("value").then(stuSnap=>{
            if(!stuSnap.exists()){
                showPopup("خطأ","الطالب غير موجود");
                scannerBusy=false;
                return startScanner();
            }

            const stu = stuSnap.val();
            const now = new Date();
            const timeShort = now.toTimeString().slice(0,5);
            const timeFull = now.toLocaleTimeString("ar-SA");
            const status = getAttendanceStatus(timeShort);
            const firstName = (stu.NAME || "").split(" ")[0];

            ref.set({
                id:id,
                name:stu.NAME,
                grade:stu.GRADE,
                class:stu.CLASS,
                parentMobile:stu.PARENT_MOBILE,
                time:timeFull,
                date:today,
                status:status
            }).then(()=>{

                /* إرسال رسالة التأخر */
                if(status === "متأخر" && stu.PARENT_MOBILE){
                    const msg = `ابنكم (${firstName}) تأخر عن الحضور وقت الوصول ${timeFull}`;
                    sendSMS(stu.PARENT_MOBILE, msg);
                }

                showPopup(firstName,"تم تسجيل: "+status);
                scannerBusy=false;
                startScanner();
            });
        });
    });
}

/* دعم الباركود */
let barcodeBuffer = "";
document.addEventListener("keydown",(e)=>{
    if(scannerBusy) return;

    if(e.key === "Enter"){
        const code = barcodeBuffer.trim();
        barcodeBuffer = "";
        if(/^\d+$/.test(code)){
            scannerBusy = true;
            recordAttendance(code);
        }
    } else {
        barcodeBuffer += e.key;
    }
});

/* تحديث الشيت */
function syncToSheet(){
    fetch("https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec?action=sync")
    .then(()=>showToast("تم تحديث الشيت"))
    .catch(()=>showToast("فشل تحديث الشيت"));
}
</script>

</body>
</html>
