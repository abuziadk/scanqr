<script>
function showPasswordBox() {
    const box = document.getElementById("passwordBox");
    box.style.display = "block";

        box.style.opacity = "1";
        box.style.transform = "translate(-50%, -50%) scale(1)";

}

function closePasswordBox() {
    const box = document.getElementById("passwordBox");
    box.style.opacity = "0";
    box.style.transform = "translate(-50%, -50%) scale(0.7)";

    setTimeout(() => {
        box.style.display = "none";
    }, 200);
}

const ABSENCE_PASSWORD = "2034"; // ← غيّرها كما تريد

function checkAbsencePassword() {
    const input = document.getElementById("absencePassInput").value;

    if (input === ABSENCE_PASSWORD) {
        closePasswordBox();
        runAbsence(); // ← تشغيل الغياب بعد التحقق
    } else {
        showToast("❌ كلمة المرور غير صحيحة");
    }
}

/* -----------------------------------
   نافذة تأكيد إرسال الرسائل (Popup)
----------------------------------- */
function showSMSConfirm() {

    box.style.display = "block";

function closeSMSConfirm() {

/* -----------------------------------
   رابط Web App الخاص بالغياب
----------------------------------- */
const ABSENCE_URL =
    "https://script.google.com/macros/s/AKfycbzif8zmJWSVYHeUx-IqA_THoPRZieuYWEJNi-3prV0GQXfkUoY_oCoBZkEacVrcC-u-/exec";

/* -----------------------------------
   تسجيل الغياب أولاً (بدون رسائل)
   ثم إظهار نافذة التأكيد
----------------------------------- */
function checkAbsenceLock() {
    const today = new Date().toLocaleDateString("en-CA");

    return db.ref("absence_lock").once("value").then(snap => {
        const lastRun = snap.val();

        if (lastRun === today) {
            showToast("⚠ تم تسجيل الغياب مسبقًا اليوم");
            return false; // ممنوع
        }

        // السماح بالتشغيل + تخزين التاريخ
        db.ref("absence_lock").set(today);
        return true;
    });
}

function runAbsence() {

    checkAbsenceLock().then(allowed => {

        if (!allowed) return;

        // تشغيل شاشة التحميل
        document.getElementById("absenceLoading").style.display = "block";

        fetch(ABSENCE_URL + "?action=absence&sendSMS=false")
            .then(r => r.text())
            .then(() => {

                // إخفاء شاشة التحميل مباشرة بعد انتهاء التسجيل
                document.getElementById("absenceLoading").style.display = "none";

                showToast("✔ تم تسجيل الغياب");

                // الآن نعرض نافذة التأكيد
                showSMSConfirm();
            })
            .catch(() => {
                document.getElementById("absenceLoading").style.display = "none";
                showToast("❌ حدث خطأ أثناء تسجيل الغياب");
            });

    });
}


/* -----------------------------------
   إرسال الرسائل بعد الموافقة
----------------------------------- */
function sendAbsenceSMS() {
    closeSMSConfirm();

    // تشغيل شاشة تحميل الإرسال فقط
    document.getElementById("smsLoading").style.display = "block";

    fetch(ABSENCE_URL + "?action=sendSMS")
        .then(r => r.text())
        .then(() => {

            // إخفاء شاشة تحميل الإرسال
            document.getElementById("smsLoading").style.display = "none";

            showToast("✔ تم إرسال رسائل الغياب");
        })
        .catch(() => {

            // إخفاء شاشة تحميل الإرسال حتى لو فشل
            document.getElementById("smsLoading").style.display = "none";

            showToast("❌ فشل إرسال الرسائل");
        });
}


/* -----------------------------------
   Toast
----------------------------------- */
function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=>{ t.style.display="none"; },2000);
}

/* -----------------------------------
   Popup تسجيل الحضور
----------------------------------- */
function showPopup(name,status){
    document.getElementById("popupName").textContent = name;
    document.getElementById("popupStatus").textContent = status;

    const box = document.getElementById("popupBox");
    box.classList.add("show");

    setTimeout(()=>{ box.classList.remove("show"); },2000);
}

/* -----------------------------------
   الصوت
----------------------------------- */
let soundEnabled = false;

function enableSound(){
    const audio = document.getElementById("successSound");
    audio.muted = true;

    audio.play().then(()=>{
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        soundEnabled = true;
        showToast("تم تفعيل الصوت ✔");
    });
}

/* -----------------------------------
   الإعدادات
----------------------------------- */
let SETTINGS = { END_PRESENT:"9:00", END_LATE:"10:40" };

db.ref("settings").once("value").then(s=>{
    if(s.exists()) SETTINGS=s.val();
});

function getAttendanceStatus(timeStr){
    if(!timeStr) return "غائب";

    const [h,m] = timeStr.split(":").map(Number);
    const t = h*60+m;

    const [pH,pM] = SETTINGS.END_PRESENT.split(":").map(Number);
    const endPresent = pH*60+pM;

    const [lH,lM] = SETTINGS.END_LATE.split(":").map(Number);
    const endLate = lH*60+lM;

    if(t <= endPresent) return "حاضر";
    if(t <= endLate) return "متأخر";
    return "غائب";
}

/* -----------------------------------
   QR Scanner
----------------------------------- */
let scanner = null;
let scannerRunning = false;
let scannerBusy = false;

function toggleScanner(){
    if(scannerRunning){
        scanner.stop();
        scannerRunning = false;
        showToast("تم إيقاف الماسح");
    } else {
        startScanner();
        showToast("تم تشغيل الماسح");
    }
}

function startScanner(){
    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:{width:300,height:300} },
        decoded => onQR(decoded),
        () => {}
    );

    scannerRunning = true;
}

function onQR(decodedText){
    if(scannerBusy) return;
    scannerBusy = true;

    let data;
    try { data = JSON.parse(decodedText); }
    catch {
        showPopup("خطأ","QR غير صالح");
        scannerBusy=false;
        return;
    }

    if(!data.ID){
        showPopup("خطأ","QR غير مكتمل");
        scannerBusy=false;
        return;
    }

    if(soundEnabled) document.getElementById("successSound").play();

    scanner.stop().then(()=> recordAttendance(data.ID));
}

/* -----------------------------------
   تسجيل الحضور
----------------------------------- */
function recordAttendance(id){
    const today = new Date().toLocaleDateString("en-CA");
    const ref = db.ref("attendance/"+today+"/"+id);

    ref.once("value").then(snap=>{
        if(snap.exists()){
            showPopup("الطالب","مسجل مسبقًا - " + snap.val().status);
            scannerBusy=false;
            return startScanner();
        }

        db.ref("students/"+id).once("value").then(stuSnap=>{
            if(!stuSnap.exists()){
                showPopup("خطأ","الطالب غير موجود");
                scannerBusy=false;
                return startScanner();
            }

            const stu = stuSnap.val();
            const now = new Date();
            const timeShort = now.toTimeString().slice(0,5);
            const timeFull = now.toLocaleTimeString("ar-SA");
            const status = getAttendanceStatus(timeShort);
            const firstName = (stu.NAME || "").split(" ")[0];

            ref.set({
                id:id,
                name:stu.NAME,
                grade:stu.GRADE,
                class:stu.CLASS,
                parentMobile:stu.PARENT_MOBILE,
                time:timeFull,
                date:today,
                status:status
            }).then(()=>{

                if(status === "متأخر" && stu.PARENT_MOBILE){
                    const msg = `ابنكم (${firstName}) تأخر عن الحضور وقت الوصول ${timeFull}`;
                    sendSMS(stu.PARENT_MOBILE, msg);
                }

                showPopup(firstName,"تم تسجيل: "+status);
                scannerBusy=false;
                startScanner();
            });
        });
    });
}

/* -----------------------------------
   دعم الباركود
----------------------------------- */
let barcodeBuffer = "";

document.addEventListener("keydown",(e)=>{
    if(scannerBusy) return;

    if(e.key === "Enter"){
        const code = barcodeBuffer.trim();
        barcodeBuffer = "";

        if(/^\d+$/.test(code)){
            scannerBusy = true;
            recordAttendance(code);
        }
    } else {
        barcodeBuffer += e.key;
    }
});

/* -----------------------------------
   تحديث الشيت
----------------------------------- */
function syncToSheet(){
    fetch(ABSENCE_URL + "?action=sync")
        .then(()=>showToast("تم تحديث الشيت"))
        .catch(()=>showToast("فشل تحديث الشيت"));
}
